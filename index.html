<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zaqod</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: radial-gradient(circle, #3e2723 0%, #1b0000 100%);
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .bio-card {
            background: rgba(45, 30, 25, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        .avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            margin: 0 auto 20px;
            box-shadow: 0 0 20px rgba(255, 138, 101, 0.4); 
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden; 
            background: #5d4037; 
            transition: transform 0.3s ease-in-out, box-shadow 0.3s ease-in-out;
        }

        .avatar:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px rgba(255, 138, 101, 0.7);
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover; 
            transition: transform 0.3s ease-in-out;
        }

        .avatar:hover img {
            transform: scale(1.15);
        }

        h1 {
            font-size: 28px;
            margin: 0 0 10px 0;
            letter-spacing: -0.5px;
            color: #ffe0b2;
        }

        .tagline {
            color: #ff8a65; 
            font-weight: 600;
            margin-bottom: 20px;
        }

        .about-box {
            background: rgba(20, 10, 5, 0.6);
            padding: 15px;
            border-radius: 12px;
            font-size: 15px;
            line-height: 1.6;
            color: #d7ccc8;
            margin-bottom: 30px;
            border-left: 4px solid #ff8a65;
            text-align: left;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            text-decoration: none;
            color: white;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.2s ease-out;
            display: block;
        }

        .twitch-btn { background: #9146ff; }
        .twitch-btn:hover { background: #772ce8; transform: translateY(-2px); }

        .youtube-btn { background: #ef4444; }
        .youtube-btn:hover { background: #dc2626; transform: translateY(-2px); }

        .github-btn { background: #475569; }
        .github-btn:hover { background: #334155; transform: translateY(-2px); }

        .donate-btn {
            background: #ff9800; 
            color: #1b0000; 
        }
        .donate-btn:hover {
            background: #f57c00;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="bio-card">
        <div class="avatar">
            <img src="g.jpg" alt="Zaqod Avatar">
        </div>
        
        <h1>Привет, я Zaqod</h1>
        <p class="tagline">Энтузиаст | Стример | Ютубер</p>
        
        <div class="about-box">
            Привет! Я Zaqod — стример, ютубер и тиктокер из Иркутска. Снимаю контент про Linux, провожу стримы на Twitch и сам пользуюсь тем, о чём рассказываю.
        </div>
        
        <div class="links-container">
            <a href="https://www.twitch.tv/zaqod" class="btn twitch-btn" target="_blank">Twitch Канал</a>
            <a href="https://www.youtube.com/@ZAQOD" class="btn youtube-btn" target="_blank">YouTube</a>
            <a href="https://github.com/Zaqod" class="btn github-btn" target="_blank">GitHub</a>
            
            <a href="https://www.donationalerts.com/r/zaqod" class="btn donate-btn" target="_blank">Поддержать</a>
        </div>
    </div>

</body>
</html>
